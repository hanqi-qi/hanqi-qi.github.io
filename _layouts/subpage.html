---
layout: compress
---
<!doctype html>
<html lang="en" class="no-js">
<head>
  {% include head.html %}
  {% include head/custom.html %}
  <style>
    body {
      background: #fff;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .subpage-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2em 2em 4em 2em;
    }
    .subpage-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1em 0 2em 0;
      border-bottom: 1px solid #eee;
      margin-bottom: 2em;
    }
    .subpage-nav a.home-link {
      font-size: 0.9em;
      color: #4a90d9;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subpage-nav a.home-link:hover {
      text-decoration: underline;
    }
    .subpage-nav .site-title {
      font-size: 0.95em;
      font-weight: 600;
      color: #555;
    }
    .subpage-nav-links {
      display: flex;
      gap: 1.5em;
      font-size: 0.88em;
    }
    .subpage-nav-links a {
      color: #555;
      text-decoration: none;
    }
    .subpage-nav-links a:hover {
      color: #4a90d9;
    }
    .page__content h1 {
      font-size: 1.8em;
      margin-bottom: 0.5em;
      color: #222;
    }
    .page__content h2 {
      font-size: 1.3em;
      margin-top: 1.8em;
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.3em;
    }
    .page__content p, .page__content li {
      line-height: 1.75;
      font-size: 0.97em;
    }
    .page__content a {
      color: #4a90d9;
    }
  </style>
</head>
<body>
  {% include browser-upgrade.html %}
  {% include masthead.html %}
  <div class="subpage-wrap">
    <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
      {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
      <section class="page__content" itemprop="text">
        {{ content }}
      </section>
    </article>
  </div>
  {% include scripts.html %}
</body>
</html>
